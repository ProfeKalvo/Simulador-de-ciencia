<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PhysSim - Péndulo Doble</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #F0F9F4; 
            margin: 0; 
            color: #2D4A3E; 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
        }
        canvas { display: block; margin: 0 auto; cursor: crosshair; }
        .panel-control { 
            position: fixed; bottom: 0; width: 100%; 
            background: white; padding: 20px; 
            border-top: 4px solid #56ab91; 
            box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
            z-index: 20;
        }
        input[type=range] { accent-color: #56ab91; width: 100%; }
    </style>
</head>
<body>

    <header class="p-4 bg-white border-b border-green-100 flex justify-between items-center shadow-sm">
        <button onclick="window.location.href='../index.html'" class="text-sm font-bold text-green-700 hover:text-green-900">
            🡠 REGRESAR AL ÍNDICE
        </button>
        <div class="text-center">
            <h1 class="text-lg font-bold text-gray-700 uppercase tracking-tighter text-sm">Mecánica Clásica</h1>
            <p class="text-green-600 font-bold text-xl">Péndulo Doble (Caos)</p>
        </div>
        <div class="w-24 text-right text-[10px] text-gray-400 font-bold uppercase">Ciencias divertida</div>
    </header>

    <canvas id="canvas"></canvas>

    <div class="panel-control">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-8">
            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-black text-gray-700 uppercase">Masa 1 (kg)</label>
                <input type="range" id="m1" min="5" max="40" value="10">
                <span id="m1_val" class="text-xs font-bold text-green-700 text-center">10</span>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-black text-gray-700 uppercase">Masa 2 (kg)</label>
                <input type="range" id="m2" min="5" max="40" value="10">
                <span id="m2_val" class="text-xs font-bold text-green-700 text-center">10</span>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-black text-gray-700 uppercase">Longitud recorrida</label>
                <input type="range" id="r_len" min="50" max="150" value="120">
                <span id="r_val" class="text-xs font-bold text-green-700 text-center">120</span>
            </div>
            <div class="flex gap-2 items-center">
                <button id="resetBtn" class="bg-[#56ab91] hover:bg-[#3d8c75] text-white flex-grow py-3 rounded-xl font-bold transition-all shadow-md uppercase text-sm">
                    Reiniciar
                </button>
            </div>
        </div>
    </div>

    <div id="guia-container" class="fixed bottom-36 right-10 z-50 flex flex-col items-center">
        <div id="burbuja-texto" class="absolute bottom-full mb-4 w-64 bg-white border-2 border-green-500 p-4 rounded-2xl shadow-xl text-sm text-gray-700 hidden">
            <p id="mensaje-guia">Puedes cambiar los paramentros del pendulo y observar cómo surgen trayectorias totalemente distintas</p>
            <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[15px] border-t-green-500"></div>
        </div>
        <div class="cursor-pointer transition-transform active:scale-95" onclick="toggleGuia()">
            <img src="../assets/tu-avatar.png" alt="Guía" class="w-32 h-32 md:w-40 md:h-40 object-contain drop-shadow-lg">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        window.onload = () => {
    setTimeout(() => {
        hablarGuia("Puedes cambiar los paramentros del pendulo y observar cómo surgen trayectorias totalemente distintas. ¡Explora diferentes configuraciones y aprende sobre el caos en sistemas dinámicos");
    }, 1000);
};
        
        // Parámetros físicos
        let r1 = 120, r2 = 120;
        let m1 = 10, m2 = 10;
        let a1 = Math.PI / 2, a2 = Math.PI / 2;
        let a1_v = 0, a2_v = 0;
        let g = 0.8; // Gravedad ajustada para visibilidad
        
        let path = []; // Para la estela

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 100;
        }
        window.onresize = resize;
        resize();

        function toggleGuia() {
            document.getElementById('burbuja-texto').classList.toggle('hidden');
        }

        function step() {
            // Ecuaciones de movimiento (Aceleración angular)
            let num1 = -g * (2 * m1 + m2) * Math.sin(a1);
            let num2 = -m2 * g * Math.sin(a1 - 2 * a2);
            let num3 = -2 * Math.sin(a1 - a2) * m2;
            let num4 = a2_v * a2_v * r2 + a1_v * a1_v * r1 * Math.cos(a1 - a2);
            let den = r1 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
            let a1_a = (num1 + num2 + num3 * num4) / den;

            num1 = 2 * Math.sin(a1 - a2);
            num2 = (a1_v * a1_v * r1 * (m1 + m2));
            num3 = g * (m1 + m2) * Math.cos(a1);
            num4 = a2_v * a2_v * r2 * m2 * Math.cos(a1 - a2);
            den = r2 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
            let a2_a = (num1 * (num2 + num3 + num4)) / den;

            // Integración
            a1_v += a1_a;
            a2_v += a2_a;
            a1 += a1_v;
            a2 += a2_v;

            // Fricción mínima para realismo
            a1_v *= 0.999;
            a2_v *= 0.999;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let cx = canvas.width / 2;
            let cy = canvas.height / 3;

            let x1 = cx + r1 * Math.sin(a1);
            let y1 = cy + r1 * Math.cos(a1);
            let x2 = x1 + r2 * Math.sin(a2);
            let y2 = y1 + r2 * Math.cos(a2);

            // Dibujar Estela (Path)
            path.push({x: x2, y: y2});
            if (path.length > 150) path.shift();
            
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(86, 171, 145, 0.3)';
            ctx.lineWidth = 2;
            for(let i=0; i<path.length-1; i++){
                ctx.moveTo(path[i].x, path[i].y);
                ctx.lineTo(path[i+1].x, path[i+1].y);
            }
            ctx.stroke();

            // Brazos
            ctx.beginPath();
            ctx.strokeStyle = '#2D4A3E';
            ctx.lineWidth = 4;
            ctx.moveTo(cx, cy);
            ctx.lineTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // Masas (Bobs)
            ctx.fillStyle = '#56ab91';
            ctx.beginPath();
            ctx.arc(x1, y1, m1, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#C3B1E1'; // Pastel Purple para la segunda masa
            ctx.beginPath();
            ctx.arc(x2, y2, m2, 0, Math.PI * 2);
            ctx.fill();

            step();
            requestAnimationFrame(draw);
        }

        // Controles interactivos
        document.getElementById('m1').oninput = function() {
            m1 = parseFloat(this.value);
            document.getElementById('m1_val').innerText = m1;
        };
        document.getElementById('m2').oninput = function() {
            m2 = parseFloat(this.value);
            document.getElementById('m2_val').innerText = m2;
        };
        document.getElementById('r_len').oninput = function() {
            r1 = r2 = parseFloat(this.value);
            document.getElementById('r_val').innerText = r1;
        };
        document.getElementById('resetBtn').onclick = function() {
            a1 = Math.PI / 2; a2 = Math.PI / 2;
            a1_v = 0; a2_v = 0;
            path = [];
        };

        draw();
    </script>
</body>
</html>
