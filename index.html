<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunSci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #F0F9F4; /* Verde muy pálido de fondo */
            background-image: radial-gradient(#d1eadd 1px, transparent 1px);
            background-size: 20px 20px; /* Patrón de puntos tipo cuaderno */
            color: #2D4A3E;
            font-family: 'Outfit', sans-serif;
        }      
        .header-banner {
            background: linear-gradient(135deg, #A8E6CF 0%, #DCEDC1 100%);
            border-bottom: 5px solid #56ab91;
        }
        .card-fisica {
            background: white;
            border: 1px solid #cde5d8;
            transition: all 0.3s ease;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .card-fisica:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(86, 171, 145, 0.15);
            border-color: #56ab91;
        }
        .btn-entrar {
            background-color: #56ab91;
            color: white;
            transition: background 0.3s;
        }
        .btn-entrar:hover {
            background-color: #3d8c75;
        }
        .tag-categoria {
            background-color: #e2f3eb;
            color: #2d6a4f;
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="header-banner py-12 px-6 mb-12 shadow-sm text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-800 tracking-tight">
                Ciencia interactiva-<span class="text-green-800">FunSci</span>
            </h1>
            <p class="text-green-900 mt-4 text-lg font-medium opacity-80 uppercase tracking-widest">
                Aprendiendo ciencia de forma divertida
            </p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div id="lobby-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>
    <div id="guia-container" class="fixed bottom-32 right-8 flex flex-col items-end z-100">
    <div id="burbuja-texto" class="bg-white border-2 border-green-500 p-4 rounded-2xl shadow-lg mb-4 max-w-xs text-sm text-gray-700 hidden">
        <p id="mensaje-guia">¡Hola! Soy el profe Kalvo. ¿Qué quieres aprender hoy?.</p>
    </div>    
    <div class="relative group cursor-pointer" onclick="toggleGuia()">
        <div class="absolute -inset-1 bg-green-200 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
        <img src="assets/tu-avatar.png" alt="Avatar Guía" class="relative w-32 h-32 md:w-32 md:h-32 object-contain hover:scale-150 transition-transform">
    </div>
</div>

<script>
    function toggleGuia() {
        const burbuja = document.getElementById('burbuja-texto');
        burbuja.classList.toggle('hidden');
    }

    // Función para cambiar el mensaje desde otros scripts
    function hablarGuia(texto) {
        document.getElementById('mensaje-guia').innerText = texto;
        document.getElementById('burbuja-texto').classList.remove('hidden');
    }
</script>

    <script>
        // BASE DE DATOS MODULAR
        const simulaciones = [
            {
                titulo: "Orbitales Atómicos",
                categoria: "Física Cuántica",
                descripcion: "Explora la forma de las nubes electrónicas y los números cuánticos n, l y m.",
                imagen: "⚛️",
                link: "sim/orbitales_2.html"
            },
                        {
    titulo: "Hibridización Orbital",
    categoria: "Enlace Químico",
    descripcion: "Descubre cómo se pueden mezclar los orbitales atómicos para formar enlaces químicos y la geometría de las moléculas.",
    imagen: "👨‍🔬",
    link: "sim/hibridización.html"
},
            {
                titulo: "Explora el caos",
                categoria: "sistemas dinámicos",
                descripcion: "Descubre como pequeñas variaciones pueden generar resultados totalmente inesperados.",
                imagen: "🌪️",
                link: "sim/SIMULACIÓNDELCAOS.html"
            },
            {
                titulo: "Péndulo Doble",
                categoria: "Mecánica Clásica",
                descripcion: "Observa el comportamiento caótico de un péndulo doble.",
                imagen: "🪀",
                link: "sim/PENDULO.html"
            },
        ];

        function renderizarLobby() {
            const grid = document.getElementById('lobby-grid');
            
            simulaciones.forEach(sim => {
                const card = `
                    <div class="card-fisica p-8 flex flex-col h-full">
                        <div class="text-4xl mb-4">${sim.imagen}</div>
                        <span class="tag-categoria text-[10px] font-bold px-3 py-1 rounded-full w-max uppercase mb-3">
                            ${sim.categoria}
                        </span>
                        <h3 class="text-2xl font-bold mb-3 text-gray-800">${sim.titulo}</h3>
                        <p class="text-gray-600 text-sm leading-relaxed mb-6 flex-grow">
                            ${sim.descripcion}
                        </p>
                        <button onclick="window.location.href='${sim.link}'" 
                                class="btn-entrar w-full py-3 rounded-xl font-semibold shadow-md">
                            Demole!!
                        </button>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }
        window.onload = () => {
    setTimeout(() => {
        hablarGuia("¡Hola! Soy el profe Kalvo. ¿Qué quieres aprender hoy?");
    }, 1000);
};
        renderizarLobby();
    </script>
</body>
</html>
