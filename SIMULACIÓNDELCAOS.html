<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PhysSim - Atractor de Lorenz</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #F0F9F4; 
            margin: 0; 
            color: #2D4A3E; 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
        }
        #plot { width: 100vw; height: 70vh; }
        .panel-control { 
            position: fixed; bottom: 0; width: 100%; 
            background: white; padding: 20px; 
            border-top: 4px solid #56ab91; 
            box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
            z-index: 20;
        }
        input { 
            background: #f1f5f9; 
            border: 1px solid #cbd5e1; 
            padding: 4px 8px; 
            border-radius: 6px;
            width: 80px;
        }
    </style>
</head>
<body>

    <header class="p-4 bg-white border-b border-green-100 flex justify-between items-center shadow-sm">
        <button onclick="window.location.href='../index.html'" class="text-sm font-bold text-green-700 hover:text-green-900">
            🡠 REGRESAR
        </button>
        <div class="text-center">
            <h1 class="text-lg font-bold text-gray-700 uppercase tracking-tighter text-sm">El orden dentro del caos</h1>
            <p class="text-green-600 font-bold text-xl">Atractor de Lorenz</p>
        </div>
        <div class="w-24 text-right text-[10px] text-gray-400 font-bold uppercase">Aprendiendo con el profe Kalvo</div>
    </header>

    <div id="plot"></div>

    <div class="panel-control">
        <div class="max-w-5xl mx-auto flex flex-wrap items-center justify-around gap-4">
            <div class="flex items-center gap-4">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400">POSICIÓN X₀</label>
                    <input type="number" id="x0" value="0.1" step="0.1">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400">POSICIÓN Y₀</label>
                    <input type="number" id="y0" value="0.0" step="0.1">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400">POSICIÓN Z₀</label>
                    <input type="number" id="z0" value="0.0" step="0.1">
                </div>
            </div>

            <div class="flex gap-2">
                <button id="runBtn" class="bg-[#56ab91] hover:bg-[#3d8c75] text-white px-8 py-3 rounded-xl font-bold transition-all shadow-md">
                    REPRODUCIR ANIMACIÓN
                </button>
                <button id="resetBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-6 py-3 rounded-xl font-bold transition-all">
                    RESETEAR
                </button>
            </div>

            <p class="text-[11px] text-gray-500 max-w-[200px] italic">
                Parámetros estándar: <br> σ=10, ρ=28, β=8/3
            </p>
            <div id="guia-container" class="fixed bottom-32 right-8 flex flex-col items-end z-50">
    <div id="burbuja-texto" class="bg-white border-2 border-green-500 p-4 rounded-2xl shadow-lg mb-4 max-w-xs text-sm text-gray-700 hidden">
        <p id="mensaje-guia">¡Hola! Soy tu asistente científico. Haz clic en mí para obtener ayuda.</p>
    </div>
    
    <div class="relative group cursor-pointer" onclick="toggleGuia()">
        <div class="absolute -inset-1 bg-green-200 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
        <img src="assets_2/tu-avatar_2.png" alt="Avatar Guía" class="relative w-50 h-50 md:w-32 md:h-32 object-contain hover:scale-150 transition-transform">
    </div>
</div>

<script>
    function toggleGuia() {
        const burbuja = document.getElementById('burbuja-texto');
        burbuja.classList.toggle('hidden');
    }

    // Función para cambiar el mensaje desde otros scripts
    function hablarGuia(texto) {
        document.getElementById('mensaje-guia').innerText = texto;
        document.getElementById('burbuja-texto').classList.remove('hidden');
    }
</script>
        </div>
    </div>

    <script>
        let x = [], y = [], z = [];
        let animationId = null;
        
        // Parámetros estándar de Lorenz
        const sigma = 10;
        const rho = 28;
        const beta = 8/3;
        const dt = 0.01; // Paso del tiempo

        function initPlot() {
            const data = [{
                type: 'scatter3d',
                mode: 'lines',
                x: [0], y: [0], z: [0],
                line: {
                    width: 4,
                    color: [0],
                    colorscale: 'Viridis'
                }
            }];

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                scene: {
                    xaxis: { range: [-100, 100], backgroundcolor: "#f8fafc", showbackground: true },
                    yaxis: { range: [-50, 50], backgroundcolor: "#f8fafc", showbackground: true },
                    zaxis: { range: [0, 70], backgroundcolor: "#f8fafc", showbackground: true },
                    camera: { eye: { x: 0.8, y: 0.8, z: 1.5 } }
                },
                margin: { l: 0, r: 0, t: 0, b: 0 }
            };

            Plotly.newPlot('plot', data, layout, {displayModeBar: false});
        }

        function runSimulation() {
            // Limpiar datos previos
            cancelAnimationFrame(animationId);
            x = [parseFloat(document.getElementById('x0').value)];
            y = [parseFloat(document.getElementById('y0').value)];
            z = [parseFloat(document.getElementById('z0').value)];
            
            let curX = x[0];
            let curY = y[0];
            let curZ = z[0];

            function step() {
                // Ecuaciones de Lorenz
                let dx = sigma * (curY - curX) * dt;
                let dy = (curX * (rho - curZ) - curY) * dt;
                let dz = (curX * curY - beta * curZ) * dt;

                curX += dx;
                curY += dy;
                curZ += dz;

                x.push(curX);
                y.push(curY);
                z.push(curZ);

                // Actualizar gráfico cada 5 pasos para suavidad
                if (x.length % 5 === 0) {
                    Plotly.restyle('plot', {
                        x: [x],
                        y: [y],
                        z: [z],
                        'line.color': [z] // El color cambia según la altura Z
                    });
                }

                if (x.length < 3000) { // Límite de puntos para rendimiento
                    animationId = requestAnimationFrame(step);
                }
            }
            step();
        }

        document.getElementById('runBtn').onclick = runSimulation;
        document.getElementById('resetBtn').onclick = () => {
            cancelAnimationFrame(animationId);
            initPlot();
        };
        document.getElementById('runBtn').addEventListener('click', () => {
         hablarGuia("¡Mira cómo se forma la mariposa! Pequeños cambios en X, Y o Z crearán rutas totalmente distintas.");
        });

        window.onload = initPlot;
    </script>
</body>
</html>
